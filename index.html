<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constructora Carvas | Calidad que se ve, confianza que permanece</title>
    <meta
      name="description"
      content="Constructora Carvas desarrolla viviendas, radieres, estructuras metálicas y soluciones integrales con calidad garantizada en Osorno y la Región de Los Lagos."
    />
    <meta
      name="keywords"
      content="constructora en Osorno, construcción de casas, radieres, ampliaciones, fosas sépticas, servicios sanitarios"
    />
    <meta property="og:title" content="Constructora Carvas" />
    <meta
      property="og:description"
      content="Construimos tu hogar con calidad garantizada, precios transparentes y cumplimiento de plazos."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/photos/hero/hero-01.jpg" />
    <meta name="theme-color" content="#27286c" />
    <link rel="icon" type="image/png" href="assets/brand/logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <a class="skip-link" href="#inicio">Ir al contenido principal</a>
      <header class="site-header" id="top"></header>
      <main id="app" class="site-main"></main>
      <footer class="site-footer" id="site-footer"></footer>
      <button
        class="floating-whatsapp"
        id="floating-whatsapp"
        type="button"
        aria-label="Escribir a WhatsApp"
      >
        <span>WhatsApp</span>
      </button>
    </div>

    <div class="image-modal" id="image-modal" hidden>
      <div class="image-modal__backdrop" data-close-image-modal></div>
      <div class="image-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="image-modal-title">
        <button class="image-modal__close" id="image-modal-close" type="button" aria-label="Cerrar imagen">
          ×
        </button>
        <p class="sr-only" id="image-modal-title">Vista ampliada de imagen</p>
        <img class="image-modal__image" id="image-modal-image" alt="" />
      </div>
    </div>

    <noscript>
      <div class="noscript-banner">
        Este sitio necesita JavaScript habilitado para cargar la experiencia completa.
      </div>
    </noscript>

    <script src="content.js" defer></script>
    <script src="main.js" defer></script>
  </body>
</html>
